services:
  headunit-dashboard:
    container_name: "headunit-dashboard"
    hostname: "headunit-dashboard"
    image: dashboard:latest
    pull_policy: build
    restart: on-failure:5
    environment:
      - SERVER_URI=opc.tcp://plc-server:4840/KRITIS3M/
    build:
      context: ${REF}opcua/dashboard/python-opcua-asyncio/latest
      additional_contexts:
        container_context: ${REF}opcua/dashboard/python-opcua-asyncio/latest
    ports:
      - "8050:8050"
    networks:
      - it-net
    depends_on:
      - plc-server
  plc-server:
    container_name: "plc-server"
    hostname: "plc-server"
    image: plc-server:latest
    pull_policy: build
    restart: on-failure:5
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 4840 || exit 1"]
      interval: 1m
      timeout: 5s
      retries: 3
    build:
      context: ${REF}opcua/server/nodejs-node-opcua/latest
      args:
        NODESET_MODEL: "PLC.NodeSet2.xml"
      additional_contexts:
        container_context: ${REF}opcua/server/nodejs-node-opcua/latest
        nodeset_context: ${META}demo-nodeset2
        companion_context: ${META}companion-specifications
        configuration_context: ${META}server-configuration
    networks:
      - it-net
      - plc-net
  plc-historian:
    container_name: "plc-historian"
    hostname: "plc-historian"
    image: historian:latest
    pull_policy: build
    restart: on-failure:5
    environment:
      - SERVER_URI=opc.tcp://plc-server:4840/KRITIS3M/
    volumes:
      - /tmp/docker/database:/database
    build:
      context: ${REF}opcua/historian/python-opcua-asyncio/latest
      additional_contexts:
        container_context: ${REF}opcua/historian/python-opcua-asyncio/latest
    networks:
      - plc-net
    depends_on:
      - plc-server
  plc-logic:
    container_name: "plc-logic"
    hostname: "plc-logic"
    image: plc-logic:latest
    pull_policy: build
    restart: on-failure:5
    environment:
      - PS_URI=opc.tcp://plc-server:4840
      - LSS_URI=opc.tcp://levelsensor-server:4840
      - VS_URI=opc.tcp://valve-server:4840
    build:
      context: ${REF}opcua/plc-logic/python-opcua-asyncio/latest
      additional_contexts:
        container_context: ${REF}opcua/plc-logic/python-opcua-asyncio/latest
    networks:
      - plc-net
      - ot-net
    depends_on:
      - plc-server
      - levelsensor-server
      - valve-server
  levelsensor-server:
    container_name: "levelsensor-server"
    hostname: "levelsensor-server"
    image: levelsensor-server:latest
    pull_policy: build
    restart: on-failure:5
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 4840 || exit 1"]
      interval: 1m
      timeout: 5s
      retries: 3
    build:
      context: ${REF}opcua/server/nodejs-node-opcua/latest
      args:
        NODESET_MODEL: "Tank.NodeSet2.xml"
      additional_contexts:
        container_context: ${REF}opcua/server/nodejs-node-opcua/latest
        nodeset_context: ${META}demo-nodeset2
        companion_context: ${META}companion-specifications
        configuration_context: ${META}server-configuration
    networks:
      - levelsensor-net
      - ot-net
  water-tank-simulation:
    container_name: "water-tank-simulation"
    hostname: "water-tank-simulation"
    image: water-tank-simulation:latest
    pull_policy: build
    restart: on-failure:5
    environment:
      - SERVER_URI=opc.tcp://levelsensor-server:4840/KRITIS3M/
    build:
      context: ${REF}opcua/water-tank-simulation/python-opcua-asyncio/latest
      additional_contexts:
        container_context: ${REF}opcua/water-tank-simulation/python-opcua-asyncio/latest
    networks:
      - levelsensor-net
    depends_on:
      - levelsensor-server
  valve-server:
    container_name: "valve-server"
    image: valve-server:latest
    pull_policy: build
    restart: on-failure:5
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 4840 || exit 1"]
      interval: 1m
      timeout: 5s
      retries: 3
    build:
      context: ${REF}opcua/server/nodejs-node-opcua/latest
      args:
        NODESET_MODEL: "Valve.NodeSet2.xml"
      additional_contexts:
        container_context: ${REF}opcua/server/nodejs-node-opcua/latest
        nodeset_context: ${META}demo-nodeset2
        companion_context: ${META}companion-specifications
        configuration_context: ${META}server-configuration
    networks:
      - ot-net
networks:
  it-net:
    name: it-net
  plc-net:
    name: plc-net
    external: false
  ot-net:
    name: ot-net
  levelsensor-net:
    name: levelsensor-net
    external: false

